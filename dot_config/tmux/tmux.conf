set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -s extended-keys on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g status off

bind '"' split-window -v -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind x kill-pane

bind w kill-window

bind-key "s" run-shell "sesh connect \"$(
  sesh list -t --icons | fzf --tmux 60%,40% --scheme=path --tiebreak=chunk,length \
    --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^t tmux ^z zoxide ^f find ^x kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-z:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -t d . ~)' \
    --bind 'ctrl-x:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --no-preview
)\""

bind -N "last-session (via sesh) " L run-shell "sesh last"
